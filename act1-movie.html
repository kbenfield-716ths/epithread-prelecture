<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Act 1 — EpiThread</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --paper:    #f5f0e8;
      --paper-dk: #ece5d4;
      --ink:      #1c1a16;
      --ink-lt:   #4a4540;
      --ocean:    #2c5f6e;
      --rust:     #b84c2b;
      --rule:     #c8bfaa;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100dvh;
      height: 100vh;
      overflow: hidden;
      background: var(--paper);
      color: var(--ink);
      font-family: 'IBM Plex Sans', sans-serif;
      font-weight: 300;
    }

    body {
      display: flex;
      flex-direction: column;
    }

    .video-wrap {
      flex: 1;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1c1a16;
      position: relative;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #1c1a16;
    }

    .end-overlay {
      position: absolute;
      inset: 0;
      background: rgba(28, 26, 22, 0.92);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      z-index: 10;
    }

    .end-overlay.visible {
      display: flex;
    }

    .end-title {
      font-family: 'Playfair Display', serif;
      font-weight: 900;
      font-size: clamp(1.4rem, 4vw, 2.2rem);
      color: var(--paper);
    }

    .end-sub {
      font-size: 0.88rem;
      color: var(--rule);
      max-width: 420px;
      text-align: center;
      line-height: 1.6;
    }

    .end-actions {
      display: flex;
      gap: 1rem;
      margin-top: 0.5rem;
    }

    .end-btn {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 0.6rem 1.4rem;
      cursor: pointer;
      transition: all 0.15s;
    }

    .end-btn.primary {
      background: var(--ocean);
      color: white;
      border: 2px solid var(--ocean);
    }

    .end-btn.primary:hover {
      background: #4a8fa0;
      border-color: #4a8fa0;
    }

    .end-btn.secondary {
      background: none;
      color: var(--paper);
      border: 1px solid var(--rule);
    }

    .end-btn.secondary:hover {
      border-color: var(--paper);
    }

    .bottom-bar {
      background: var(--paper);
      border-top: 1px solid var(--rule);
      padding: 0.45rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      gap: 1rem;
    }

    .bar-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--rust);
      white-space: nowrap;
    }

    .bar-right {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .transcript-btn {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.04em;
      color: var(--ocean);
      background: none;
      border: 1px solid var(--ocean);
      padding: 0.2rem 0.55rem;
      cursor: pointer;
      transition: all 0.15s;
    }

    .transcript-btn:hover {
      background: var(--ocean);
      color: white;
    }

    .bar-hint {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.55rem;
      color: var(--rule);
      letter-spacing: 0.03em;
    }

    .transcript-panel {
      display: none;
      background: var(--paper-dk);
      border-top: 1px solid var(--rule);
      padding: 1rem 1.5rem;
      max-height: 30vh;
      overflow-y: auto;
      flex-shrink: 0;
    }

    .transcript-panel.open {
      display: block;
    }

    .transcript-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.75rem;
    }

    .transcript-title {
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      font-size: 0.95rem;
    }

    .transcript-close {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.6rem;
      color: var(--ocean);
      background: none;
      border: none;
      cursor: pointer;
      text-decoration: underline;
    }

    .transcript-line {
      font-size: 0.82rem;
      line-height: 1.65;
      color: var(--ink-lt);
      padding: 0.3rem 0;
      cursor: pointer;
      transition: color 0.1s;
    }

    .transcript-line:hover {
      color: var(--ink);
    }

    .transcript-line .ts {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.62rem;
      color: var(--ocean);
      margin-right: 0.5rem;
    }

    .transcript-line.active {
      color: var(--ink);
      font-weight: 400;
    }

    .transcript-dl {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.58rem;
      color: var(--ocean);
      text-decoration: none;
      letter-spacing: 0.03em;
    }

    .transcript-dl:hover { text-decoration: underline; }

    @media (max-width: 600px) {
      .bottom-bar { padding: 0.4rem 0.75rem; }
      .bar-hint { display: none; }
    }
  </style>
</head>
<body>

  <div class="video-wrap">
    <video id="player" controls playsinline preload="metadata">
      <source src="act1-movie.mp4" type="video/mp4">
      Your browser does not support the video tag.
    </video>

    <div class="end-overlay" id="endOverlay">
      <div class="end-title">Act 1 complete</div>
      <div class="end-sub">
        Now open the Titanic dataset, filter it, and write down
        what you think the data means.
      </div>
      <div class="end-actions">
        <button class="end-btn primary" id="continueBtn">Continue to the data &rarr;</button>
        <button class="end-btn secondary" id="replayBtn">Watch again</button>
      </div>
    </div>
  </div>

  <div class="bottom-bar">
    <span class="bar-label">Act 1 &mdash; Provocation</span>
    <div class="bar-right">
      <button class="transcript-btn" id="transcriptToggle">Transcript</button>
      <span class="bar-hint">Use video controls to play, pause, scrub, or change speed</span>
    </div>
  </div>

  <div class="transcript-panel" id="transcriptPanel"></div>

  <script>
    const player = document.getElementById('player');
    const endOverlay = document.getElementById('endOverlay');
    const transcriptPanel = document.getElementById('transcriptPanel');
    const transcriptToggle = document.getElementById('transcriptToggle');

    const BEATS = [
      { start: 0, end: 13.5, caption: "Here’s a question, not a claim: when’s the last time you read something — a headline, a warning, a text from a relative — believed it, and acted on it, without once asking how anyone actually knew that?" },
      { start: 13.5, end: 37.3, caption: "If you can’t remember, that’s not a knock on you. It’s how the information reaches almost all of us — pre-digested, already turned into a conclusion. This course is not really about disease. It’s about what happens upstream of that moment: how a raw fact becomes a claim you’ll trust, and how a claim becomes a decision you’ll make." },
      { start: 37.3, end: 53.3, caption: "Epidemiology, on paper, is the study of how disease and health are distributed in populations, and why. True. But underneath the rates and the study designs there’s a simpler structure, and it’s the one this whole course sits on: data, to knowledge, to wisdom." },
      { start: 53.3, end: 75.3, caption: "Three words. By the end of today you’ll be able to define all three. That’s the easy part. The hard part is that almost every disaster in the history of public health happened because someone quietly skipped a step on that arc, or mistook one stage for another. So here’s what I want you asking, for every story I’m about to tell you: which step got skipped?" },
      { start: 75.3, end: 77.5, caption: "Welcome to the Epidemiology Thread." },
      { start: 77.5, end: 78.1, caption: "Let’s name the arc, because everything else in this course rests on it." },
      { start: 78.1, end: 91.5, caption: "Data is the raw material: a count, a measurement, a box checked on a form. On its own it means nothing — two hundred eighty-seven people died is data, and it tells you nothing about why." },
      { start: 91.5, end: 106.4, caption: "Knowledge is what happens when you organize data into a claim you can actually defend: a pattern, a rate higher in one group than another, a case for what the evidence seems to show." },
      { start: 106.4, end: 124.2, caption: "Wisdom is the last step, and the one public conversation skips most often — knowing what to do with knowledge, for a particular population, with real tradeoffs attached. The same knowledge can point toward different, equally defensible actions depending on who’s affected." },
      { start: 124.2, end: 134.2, caption: "Most of what reaches you skips a step: data treated as though it’s already knowledge, knowledge treated as though it’s already wisdom. It almost never is." },
      { start: 135.8, end: 143.6, caption: "So here are four real stories from this field’s history — two good science, two bad statistics. See if you can tell which before I get to the end of each." },
      { start: 143.6, end: 162.2, caption: "In 1951, two researchers named Doll and Hill mailed a one-line questionnaire to every doctor in Britain: what do you smoke? Forty thousand wrote back, and Doll and Hill did the least glamorous thing imaginable — they waited, for decades, watching who got sick." },
      { start: 162.3, end: 182.8, caption: "Heavy smokers turned out to be roughly twenty-five times more likely to die of lung cancer — a gap so large, so consistent across follow-up studies, that it became one of the strongest causal claims medicine has ever produced. Scale, time, and replication did the work; no single study had to." },
      { start: 182.9, end: 190.6, caption: "Here’s a true sentence: more people die inside American hospitals every year than die of gunshot wounds. Are hospitals more dangerous than guns?" },
      { start: 190.6, end: 206.9, caption: "Of course not, and you probably already sense why — hospitals are where the sickest people in the country already are, so naturally more deaths happen inside that building. The number was never wrong; the question underneath it, compared to what and who’s actually counted, was simply never asked." },
      { start: 206.9, end: 228.5, caption: "You’ve probably seen a version of the next one: a raw count of people who died shortly after a vaccine, offered as proof the vaccine killed them. That count is usually a passive report — anyone can file one, and nobody checks whether it’s true before it’s logged. The system exists to catch faint warnings, not to prove causation." },
      { start: 228.5, end: 243.2, caption: "Vaccinate two hundred million people and some of them will have a heart attack that week regardless — that’s the background rate of being two hundred million humans. The question was never whether something happened afterward. It was whether it happened more than we’d expect." },
      { start: 243.2, end: 265.3, caption: "This last one should worry you more than the other two, because nobody in it did anything wrong. In 2001, a drug called activated protein C looked like a breakthrough for sepsis — one of the biggest killers in any ICU — and the trial was so promising it was stopped early. Regulators approved it; hospitals adopted it as standard care." },
      { start: 265.3, end: 280, caption: "A decade later, a larger, more rigorous trial found no benefit at all, and the drug was pulled from the market worldwide in 2011. Nobody lied. Nobody fudged a number. An honest trial pointed one direction and turned out to be wrong." },
      { start: 280, end: 289.7, caption: "So here’s the question worth carrying out of all four: how do you know when you’ve moved from knowledge to wisdom too soon?" },
      { start: 292.4, end: 298.7, caption: "Notice none of those four stories required you to be a doctor — you’ve probably made the second or third mistake yourself, at a dinner table, without noticing." },
      { start: 298.7, end: 313, caption: "This is why epidemiology exists as its own discipline rather than a chapter inside biology or statistics: it’s built to work this arc under real conditions — incomplete data, competing explanations, decisions that can’t wait for certainty." },
      { start: 313, end: 330.2, caption: "As you go through medical school, you’re going to be given a lot of facts to learn. That knowledge came from data — and you need to ask where that data came from, and how it can break. Learning to question what you’re handed will outlast every fact you’re given over the next four years." },
      { start: 330.2, end: 332.9, caption: "So let’s stop talking about this in the abstract." },
      { start: 332.9, end: 347.9, caption: "In a minute you’ll open a real dataset — not a toy example, the actual passenger manifest of the RMS Titanic. Roughly two thousand two hundred ninety-nine people, each with a class, a sex, an age, a fare, and an outcome. Some lived. Most didn’t." },
      { start: 347.9, end: 366.5, caption: "Filter it by class, by sex, by age, and watch what moves when you isolate one variable at a time. Then do the hardest part of the whole arc: write down what you think the data means — a real hypothesis, one you’re willing to defend and willing to have taken apart." },
      { start: 366.5, end: 370.7, caption: "The data is all here. What would you look for?" },
      { start: 370.7, end: 373.6, caption: "Go build your first hypothesis. I’ll see you on the other side." },
    ];

    // Build transcript
    function fmtTime(s) {
      const m = Math.floor(s / 60);
      const sec = Math.floor(s % 60);
      return m + ':' + String(sec).padStart(2, '0');
    }

    const transcriptHTML = '<div class="transcript-header">' +
      '<span class="transcript-title">Transcript</span>' +
      '<button class="transcript-close" id="transcriptClose">Close</button>' +
      '</div>' +
      BEATS.map((b, i) =>
        '<div class="transcript-line" data-idx="' + i + '">' +
        '<span class="ts">' + fmtTime(b.start) + '</span>' +
        b.caption +
        '</div>'
      ).join('');

    transcriptPanel.innerHTML = transcriptHTML;

    // Transcript toggle
    transcriptToggle.addEventListener('click', () => {
      transcriptPanel.classList.toggle('open');
    });

    document.getElementById('transcriptClose').addEventListener('click', () => {
      transcriptPanel.classList.remove('open');
    });

    // Click transcript line to seek
    transcriptPanel.addEventListener('click', (e) => {
      const line = e.target.closest('.transcript-line');
      if (!line) return;
      const idx = parseInt(line.dataset.idx);
      player.currentTime = BEATS[idx].start;
      if (player.paused) player.play();
    });

    // Highlight current transcript line
    player.addEventListener('timeupdate', () => {
      const t = player.currentTime;
      const lines = transcriptPanel.querySelectorAll('.transcript-line');
      lines.forEach((el, i) => {
        const b = BEATS[i];
        el.classList.toggle('active', t >= b.start && t < b.end);
      });
    });

    // End overlay
    player.addEventListener('ended', () => {
      endOverlay.classList.add('visible');
      try { window.parent.postMessage('act1-complete', '*'); } catch (e) {}
    });

    document.getElementById('continueBtn').addEventListener('click', () => {
      const id = localStorage.getItem('epithreadStudentId');
      if (id) {
        if (window.parent !== window) {
          window.parent.postMessage('act1-complete', '*');
        } else {
          window.location.href = 'explorer.html';
        }
      } else {
        if (window.parent !== window) {
          window.parent.postMessage('act1-complete', '*');
        } else {
          window.location.href = 'index.html';
        }
      }
    });

    document.getElementById('replayBtn').addEventListener('click', () => {
      endOverlay.classList.remove('visible');
      player.currentTime = 0;
      player.play();
    });

  </script>

</body>
</html>
